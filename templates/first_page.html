<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: rgba(255,255,255,0.97);
    margin: 0;
    padding: 0;
  }
  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
  }
  .bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.15) 0%,
      rgba(255,255,255,0.05) 35%,
      rgba(255,255,255,0.75) 70%,
      rgba(255,255,255,0.97) 100%
    );
    z-index: 1;
  }
  .content {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    z-index: 2;
    padding: 0 90px 100px;
    text-align: center;
  }
  .heading {
    font-size: 82px;
    font-weight: 900;
    color: #222;
    line-height: 1.25;
    margin-bottom: 20px;
    word-break: keep-all;
    letter-spacing: -2px;
  }
  .accent { color: #E8862A; }
  .body {
    font-size: 34px;
    font-weight: 400;
    color: #666;
    line-height: 1.5;
    margin-bottom: 40px;
  }
  .brand {
    font-size: 50px;
    font-weight: 900;
    color: #E8862A;
    letter-spacing: 1px;
  }
  .logo-corner {
    position: absolute;
    top: 50px; right: 60px;
    z-index: 2;
    font-size: 30px;
    font-weight: 700;
    color: #E8862A;
  }
</style>
</head>
<body>
  <div class="slide">
    <img class="bg" src="{{image_path}}" alt="">
    <div class="overlay"></div>
    <div class="logo-corner">Olidia&reg;</div>
    <div class="content">
      <div class="heading">{{heading}}</div>
      <div class="body">{{body}}</div>
      <div class="brand">올리디아&reg;</div>
    </div>
  </div>
</body>
</html>
