<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #f5f3f0;
  }
  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
  }
  .bg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  .overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.1) 0%,
      rgba(255,255,255,0.0) 25%,
      rgba(255,255,255,0.7) 60%,
      rgba(255,255,255,0.97) 100%
    );
    z-index: 1;
  }
  .top-bar {
    position: absolute;
    top: 0; left: 0; width: 100%;
    z-index: 2;
    padding: 44px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .tag {
    background: #E8862A;
    color: #fff;
    padding: 10px 28px;
    border-radius: 28px;
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .logo {
    font-size: 26px;
    font-weight: 700;
    color: #E8862A;
  }
  .content {
    position: absolute;
    bottom: 0; left: 0; width: 100%;
    z-index: 2;
    padding: 0 80px 90px;
  }
  .heading {
    font-size: 52px;
    font-weight: 900;
    color: #222;
    line-height: 1.3;
    margin-bottom: 24px;
    word-break: keep-all;
    letter-spacing: -1px;
  }
  .body {
    font-size: 30px;
    font-weight: 400;
    color: #444;
    line-height: 1.7;
    word-break: keep-all;
  }
  .body strong { color: #E8862A; font-weight: 700; }
</style>
</head>
<body>
  <div class="slide">
    <img class="bg" src="{{image_path}}" alt="">
    <div class="overlay"></div>
    <div class="top-bar">
      <div class="tag">{{category_tag}}</div>
      <div class="logo">Olidia&reg;</div>
    </div>
    <div class="content">
      <div class="heading">{{heading}}</div>
      <div class="body">{{body}}</div>
    </div>
  </div>
</body>
</html>
