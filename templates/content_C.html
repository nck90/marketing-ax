<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1080px; height: 1350px; overflow: hidden;
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: rgba(0,0,0,0.9);
    margin: 0;
    padding: 0;
  }
  .slide { width: 1080px; height: 1350px; position: relative; }
  .bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
  .overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
    background: linear-gradient(to bottom, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.1) 30%, rgba(0,0,0,0.65) 65%, rgba(0,0,0,0.9) 100%);
  }
  .logo { position: absolute; top: 48px; right: 60px; z-index: 2; font-size: 28px; font-weight: 700; color: #E8862A; }
  .tag {
    position: absolute; top: 48px; left: 60px; z-index: 2;
    background: #E8862A; color: #fff; padding: 8px 24px; border-radius: 24px; font-size: 22px; font-weight: 600;
  }
  .content { position: absolute; bottom: 0; left: 0; width: 100%; z-index: 2; padding: 0 80px 90px; }
  .heading { font-size: 52px; font-weight: 900; color: #fff; line-height: 1.3; margin-bottom: 24px; word-break: keep-all; letter-spacing: -1px; }
  .body { font-size: 30px; font-weight: 400; color: rgba(255,255,255,0.85); line-height: 1.7; word-break: keep-all; }
</style>
</head>
<body>
  <div class="slide">
    <img class="bg" src="{{image_path}}" alt="">
    <div class="overlay"></div>
    <div class="tag">{{category_tag}}</div>
    <div class="logo">Olidia&reg;</div>
    <div class="content">
      <div class="heading">{{heading}}</div>
      <div class="body">{{body}}</div>
    </div>
  </div>
</body>
</html>
